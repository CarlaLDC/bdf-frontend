<img class="bg-fundo" src="assets/images/fundo.png" alt="">

<div class="login-wrapper">

  <section class="login-header-bar">
    <h1>Login</h1>
  </section>

  <div class="login-card">

    <div class="logo-area">
      <img src="assets/images/logo.png" alt="Logo Baú da Felicidade" class="login-logo">
    </div>

    <div class="form-grupo">
      <label class="form-label">📧 E-mail</label>
      <input class="form-input" type="email" placeholder="Digite seu e-mail">
    </div>

    <div class="form-grupo">
      <label class="form-label">🔒 Senha</label>
      <input class="form-input" type="password" placeholder="Digite sua senha">
    </div>

    <a class="esqueci-senha" href="#">Esqueci minha senha</a>

    <div class="acoes">
      <button class="btn-entrar">🎉 Entrar</button>
      <button class="btn-cadastrar" routerLink="/cadastros">✨ Criar conta</button>
    </div>

  </div>
</div>
