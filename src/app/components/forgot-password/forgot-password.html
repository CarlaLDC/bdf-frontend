<img class="bg-fundo" src="assets/images/fundo.png" alt="">
<div class="login-container">
  <div class="login-card">
    <img src="assets/images/logo.png" alt="Logo Baú da Felicidade" class="login-logo">
    
    <h3 class="card-title">Recuperar Senha</h3>
    <p class="card-subtitle">Digite seu e-mail cadastrado para receber o link de redefinição.</p>

    <form class="login-form" (ngSubmit)="enviarLink()">
      <p class="mensagem-sucesso" *ngIf="mensagemSucesso">{{ mensagemSucesso }}</p>
      <p class="mensagem-erro" *ngIf="mensagemErro">{{ mensagemErro }}</p>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Digite seu e-mail"
          [(ngModel)]="email"
          required
          email
        >
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Enviando...' : 'Enviar link' }}
      </button>

      <a routerLink="/login" class="btn-secondary-outline">Voltar para o Login</a>
    </form>
  </div>
</div>
