<div class="cadastros-container">
<img src="/assets/images/fundo.png" alt="Background image">

  <div class="pagina">

  <!-- Título -->
  <div class="titulo">
    <h1>Cadastro</h1>
  </div>

  <!-- Card -->
  <div class="card">

    
    <!-- Formulário -->
    <form #form="ngForm" (ngSubmit)="onSubmit(form)">

      <!-- Nome e Sobrenome -->
      <div class="linha">
        <div class="campo">
          <label>Nome:</label>
          <input type="text" name="nome" [(ngModel)]="cadastroData.nome" required placeholder="Olivia Martha" />
        </div>
        <div class="campo">
          <label>Sobrenome:</label>
          <input type="text" name="sobrenome" [(ngModel)]="cadastroData.sobrenome" required placeholder="Lima de Andrade" />
        </div>
      </div>

      <!-- CPF -->
      <div class="linha">
        <div class="campo">
          <label>CPF:</label>
          <input type="text" name="cpf" [(ngModel)]="cadastroData.cpf" required placeholder="XXX.XXX.XXX - XX" maxlength="14" />
        </div>
        <div class="campo vazio"></div>
      </div>

      <!-- Telefone e Celular -->
      <div class="linha">
        <div class="campo">
          <label>Telefone:</label>
          <input type="text" name="telefone" [(ngModel)]="cadastroData.telefone" placeholder="XXXXX XXXX" />
        </div>
        <div class="campo">
          <label>Celular:</label>
          <input type="text" name="celular" [(ngModel)]="cadastroData.celular" placeholder="+55 (XX) XXXXX XXXX" />
        </div>
      </div>

      <!-- Email -->
      <div class="linha">
        <div class="campo">
          <label>Email:</label>
          <input type="email" name="email" [(ngModel)]="cadastroData.email" required
                 placeholder="oliviamartha@gmail.com"
                 (ngModelChange)="onEmailChange()" />
        </div>
        <div class="campo vazio"></div>
      </div>

      <!-- Badge de tipo detectado pelo email -->
      <div class="badge" [class.admin]="isAdmin">
        <span *ngIf="isAdmin">🔑 Conta de Administrador</span>
        <span *ngIf="!isAdmin">👤 Conta de Cliente</span>
      </div>

      <!-- Aviso admin -->
      <div class="aviso-admin" *ngIf="isAdmin">
        ⚠️ Emails com <strong>&#64;admbau.com</strong> criam contas de <strong>Administrador</strong>.
      </div>

      <!-- Senha e Confirma Senha -->
      <div class="linha">
        <div class="campo">
          <label>Senha:</label>
          <input type="password" name="senha" [(ngModel)]="cadastroData.senha" required minlength="6" placeholder="Digite sua senha" />
        </div>
        <div class="campo">
          <label>Confirma senha:</label>
          <input type="password" name="confirmaSenha" [(ngModel)]="cadastroData.confirmaSenha" required placeholder="Confirme sua senha" />
        </div>
      </div>

      <!-- Mensagem de erro -->
      <div class="msg-erro" *ngIf="errorMessage">{{ errorMessage }}</div>

      <!-- Mensagem de sucesso -->
      <div class="msg-sucesso" *ngIf="successMessage">{{ successMessage }}</div>

      <!-- Botão -->
      <button type="submit" [disabled]="form.invalid || isLoading" [class.btn-admin]="isAdmin">
        {{ isLoading ? 'Cadastrando...' : isAdmin ? 'Cadastrar como Admin' : 'Cadastrar' }}
      </button>

    </form>
  </div>
</div>
