<img class="bg-fundo" src="assets/images/fundo.png" alt="">

<div class="perfil-wrapper">

  <section class="perfil-header-bar">
    <h1>Perfil Administrador</h1>
  </section>

  <div class="perfil-card">

    <div class="avatar-area">
      <div class="avatar-circle">
        <img src="assets/images/avatar-default.png" alt="Avatar" class="avatar-img"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
        <span class="avatar-fallback">👤</span>
      </div>
      <h2 class="nome-usuario">Thiago Marangoni</h2>
      <span class="badge-tipo">Administrador</span>

    <hr class="divisor">

    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">Tipo</span>
        <span class="info-valor">Administrador</span>
      </div>
      <div class="info-item">
        <span class="info-label">CPF</span>
        <span class="info-valor">000.000.000-00</span>
      </div>
      <div class="info-item">
        <span class="info-label">E-mail</span>
        <span class="info-valor">tmarangoni&#64;admbau.com</span>
      </div>
    </div>

    <hr class="divisor">

    <div class="acoes-admin">
      <div class="acoes-linha">
        <button class="btn-gerenciar" routerLink="/gerenciar-produto">Gerenciar Produtos</button>
        <button class="btn-gerenciar" routerLink="/gerenciar-reservas">Gerenciar Reservas</button>
      </div>
      <button class="btn-excluir">Excluir Conta</button>
      <button class="btn-sair">Sair</button>
    </div>

  </div>
</div>
