<section>
  <main>

    <div *ngIf="loading" class="loading">
      Carregando produtos...
    </div>
    
    <div class="cards" *ngIf="!loading && produtos.length > 0">
      <div *ngFor="let produto of produtos" class="card">

        <img [src]="'assets/images/' + produto.imagem" [alt]="produto.nome" class="img">

        <h3 class="textos">{{ produto.nome }}</h3>

        <p class="textos">{{ produto.tipo }}</p>
        <p class="textos">{{ produto.publico }}</p>
        <p class="textos">R$ {{ produto.preco | number:'1.2-2' }}</p>

        <button class="btn">Ver Detalhes</button>
      </div>
    </div>
 
    <div *ngIf="!loading && produtos.length === 0" class="sem-resultados">
      Nenhum produto encontrado
    </div>
  </main>
</section>
