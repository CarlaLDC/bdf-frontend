<section>
  <main>

    <div *ngIf="mensagem" class="mensagem sucesso">
      {{ mensagem }}
    </div>

    <div *ngIf="erro" class="mensagem erro">
      {{ erro }}
    </div>

    <div *ngIf="loading" class="loading">
      Carregando produtos...
    </div>
    
    <div class="cards" *ngIf="!loading && (produtos.length > 0 || modoGerenciamento)">
      <div *ngFor="let produto of produtos" class="card">

        <img [src]="imagemProduto(produto)" [alt]="produto.nome" class="img">

        <h3 class="textos">{{ produto.nome }}</h3>

        <p class="textos">{{ produto.tipo }}</p>
        <p class="textos">{{ produto.publico }}</p>
        <p class="textos">R$ {{ produto.preco | number:'1.2-2' }}</p>

        <ng-container *ngIf="!modoGerenciamento; else acoesAdmin">
          <button class="btn" [routerLink]="['/produto', produto.id]">Ver Detalhes</button>
        </ng-container>

        <ng-template #acoesAdmin>
          <div class="acoes-produto">
            <button class="btn editar" [routerLink]="['/editar-produto', produto.id]">Editar</button>
            <button
              class="btn excluir"
              type="button"
              (click)="excluirProduto(produto)"
              [disabled]="excluindoId === produto.id">
              {{ excluindoId === produto.id ? 'Excluindo...' : 'Excluir' }}
            </button>
          </div>
        </ng-template>
      </div>

      <button *ngIf="modoGerenciamento" type="button" class="card adicionar-card" routerLink="/adicionar-produto">
        <span class="icone-adicionar">+</span>
        <strong>Adicionar</strong>
      </button>
    </div>
 
    <div *ngIf="!loading && produtos.length === 0 && !modoGerenciamento" class="sem-resultados">
      Nenhum produto encontrado
    </div>
  </main>
</section>
