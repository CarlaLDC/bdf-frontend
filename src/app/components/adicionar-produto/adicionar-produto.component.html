<img class="background" src="/assets/images/fundo.png" alt="Background image">

<main>
  <section class="title">
    <h1>Adicionar Produto</h1>
  </section>

  <form #produtoForm="ngForm" class="primary-container" (ngSubmit)="salvar(produtoForm)" novalidate>
    <div class="mensagem sucesso" *ngIf="mensagem">{{ mensagem }}</div>
    <div class="mensagem erro" *ngIf="erro">{{ erro }}</div>

    <section class="form-grid">
      <div class="campo full">
        <label for="nome">Nome do produto</label>
        <input
          type="text"
          id="nome"
          name="nome"
          placeholder="Castelo inflavel"
          [(ngModel)]="produto.nome"
          required
        >
        <span *ngIf="produtoForm.submitted && produtoForm.controls['nome']?.invalid">Informe o nome do produto.</span>
      </div>

      <div class="campo">
        <label for="preco">Preco</label>
        <input
          type="number"
          id="preco"
          name="preco"
          placeholder="0,00"
          min="0.01"
          step="0.01"
          [(ngModel)]="produto.preco"
          required
        >
      </div>

      <div class="campo">
        <label for="estoque">Estoque</label>
        <input
          type="number"
          id="estoque"
          name="estoque"
          min="1"
          [(ngModel)]="produto.estoque"
          required
        >
      </div>

      <div class="campo">
        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo" [(ngModel)]="produto.tipo" required>
          <option value="" disabled>Selecione</option>
          <option value="INFLAVEL">Inflavel</option>
          <option value="MECANICA">Mecanico</option>
          <option value="RECREATIVO">Recreativo</option>
          <option value="ELETRONICO">Eletronico</option>
        </select>
      </div>

      <div class="campo">
        <label for="publico">Publico</label>
        <select id="publico" name="publico" [(ngModel)]="produto.publico" required>
          <option value="" disabled>Selecione</option>
          <option value="INFANTIL">Infantil</option>
          <option value="ADULTO">Adulto</option>
          <option value="AMBOS">Todos</option>
        </select>
      </div>

      <div class="campo">
        <label for="status">Status</label>
        <select id="status" name="status" [(ngModel)]="produto.status" required>
          <option value="ATIVO">Ativo</option>
          <option value="INATIVO">Inativo</option>
        </select>
      </div>

      <div class="campo full">
        <label for="descricao">Descricao do produto</label>
        <textarea
          id="descricao"
          name="descricao"
          placeholder="Brinquedo para festas, eventos e recreacao..."
          [(ngModel)]="produto.descricao"
          required
        ></textarea>
      </div>
    </section>

    <section class="second-container">
      <h2>Especificacoes tecnicas</h2>

      <div class="form-grid">
        <div class="campo">
          <label for="area">Area necessaria</label>
          <input type="number" name="area" id="area" placeholder="Metros" min="0" [(ngModel)]="produto.areaNecessaria">
        </div>

        <div class="campo dimensao">
          <label>Dimensoes do brinquedo</label>
          <div class="inline-inputs">
            <input type="number" name="dimensaoLargura" placeholder="Largura" min="0" [(ngModel)]="produto.dimensaoLargura">
            <span>x</span>
            <input type="number" name="dimensaoComprimento" placeholder="Comprimento" min="0" [(ngModel)]="produto.dimensaoComprimento">
          </div>
        </div>

        <div class="campo">
          <label for="energia">Requisitos de energia</label>
          <input type="number" name="energia" id="energia" placeholder="Watts" min="0" [(ngModel)]="produto.requisitosEnergia">
        </div>

        <div class="campo">
          <label for="idade">Faixa etaria recomendada</label>
          <input type="number" name="idade" id="idade" placeholder="Anos" min="0" [(ngModel)]="produto.faixaEtaria">
        </div>

        <div class="campo full">
          <label for="alvo">Publico-alvo</label>
          <input type="text" name="alvo" id="alvo" placeholder="Criancas de 4 a 10 anos" [(ngModel)]="produto.publicoAlvo">
        </div>

        <div class="campo full">
          <label for="incluso">Itens inclusos</label>
          <input type="text" name="incluso" id="incluso" placeholder="Motor, lona, monitor..." [(ngModel)]="produto.itensInclusos">
        </div>
      </div>
    </section>

    <section class="add-image">
      <div>
        <h2>Imagem do produto</h2>
        <div class="campo">
          <label for="imagemUrl">URL ou caminho da imagem</label>
          <input
            type="text"
            name="imagemUrl"
            id="imagemUrl"
            placeholder="assets/images/castelo.png"
            [(ngModel)]="produto.imagemUrl"
            (ngModelChange)="atualizarPreviewPorUrl()"
          >
        </div>
        <div class="campo">
          <label for="imagem">Escolher arquivo local</label>
          <input type="file" name="imagem" id="imagem" accept="image/*" (change)="selecionarImagem($event)">
          <span *ngIf="nomeArquivoImagem">{{ nomeArquivoImagem }}</span>
        </div>
      </div>

      <img class="preview" [src]="imagemPreview" alt="Previa do produto" (error)="corrigirImagem()">
    </section>

    <div class="btn-salvar">
      <button type="button" routerLink="/gerenciar-produto" class="secundario">Cancelar</button>
      <button type="submit" [disabled]="salvando">
        {{ salvando ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>
  </form>
</main>
