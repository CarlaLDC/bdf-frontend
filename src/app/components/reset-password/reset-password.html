<img class="bg-fundo" src="assets/images/fundo.png" alt="">
<div class="login-container">
  <div class="login-card">
    <img src="assets/images/logo.png" alt="Baú da Felicidade" class="card-logo">
    
    <h3 class="card-title">Nova Senha</h3>
    <p class="card-subtitle">Crie uma nova senha segura para a sua conta.</p>

    <div *ngIf="mensagemErro" style="color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 14px;">
      {{ mensagemErro }}
    </div>
    
    <div *ngIf="mensagemSucesso" style="color: #198754; background: #d1e7dd; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 14px;">
      {{ mensagemSucesso }}
    </div>

    <form class="login-form" (ngSubmit)="atualizarSenha()">
      <div class="input-group">
        <label for="password">Nova Senha</label>
        <input 
          type="password" 
          id="password" 
          name="novaSenha"
          [(ngModel)]="novaSenha" 
          placeholder="Digite sua nova senha"
          required>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirmar Senha</label>
        <input 
          type="password" 
          id="confirm-password" 
          name="confirmaSenha"
          [(ngModel)]="confirmaSenha" 
          placeholder="Confirme sua nova senha"
          required>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!token">Alterar Senha</button>
    </form>
  </div>
</div>
