<div class="login-container">
  <div class="login-card">
    <img src="caminho-para-sua-logo.png" alt="Baú da Felicidade" class="card-logo">
    
    <h3 class="card-title">Nova Senha</h3>
    <p class="card-subtitle">Crie uma nova senha segura para a sua conta.</p>

    <form class="login-form">
      <div class="input-group">
        <label for="password">Nova Senha</label>
        <input type="password" id="password" placeholder="Digite sua nova senha">
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirmar Senha</label>
        <input type="password" id="confirm-password" placeholder="Confirme sua nova senha">
      </div>

      <button type="submit" class="btn-primary">Alterar Senha</button>
    </form>
  </div>
</div>
