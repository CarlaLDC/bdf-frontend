<img class="bg-fundo" src="assets/images/fundo.png" alt="">

<div class="perfil-wrapper">

  <section class="perfil-header-bar">
    <h1>Meu Perfil</h1>
  </section>

  <div class="perfil-card" *ngIf="!usuario && !erro">
    <p style="text-align:center; color:#666;">Carregando perfil...</p>
  </div>

  <div class="perfil-card" *ngIf="erro">
    <p style="text-align:center; color:#c0392b;">{{ erro }}</p>
  </div>

  <div class="perfil-card" *ngIf="usuario">

    <div class="avatar-area">
      <div class="avatar-circle">
        <img src="assets/images/avatar-default.png" alt="Avatar" class="avatar-img"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
        <span class="avatar-fallback">👤</span>
      </div>
      <h2 class="nome-usuario">{{ usuario.nome }}</h2>
      <span class="badge-tipo">Cliente</span>
    </div>

    <hr class="divisor">

    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">Tipo</span>
        <span class="info-valor">Cliente</span>
      </div>
      <div class="info-item">
        <span class="info-label">E-mail</span>
        <span class="info-valor">{{ usuario.email }}</span>
      </div>
    </div>

    <hr class="divisor">

    <div class="acoes">
      <button class="btn-sair" (click)="sair()">Sair</button>
      <button class="btn-excluir" (click)="excluirConta()">Excluir Conta</button>
    </div>

  </div>
</div>
