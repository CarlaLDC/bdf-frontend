<section class="cabecalho">
    <img class="logo" src="assets/images/logo.png" alt="Logo">

    <span class="a-links">
        <a href="/">Home</a>
        <a href="/minhas-reservas">Minhas Reservas</a>
        <a href="/sobre-nos">Sobre Nós</a>
    </span>

    <input
        class="search"
        type="text"
        placeholder="Busque aqui..."
        [value]="termoBusca"
        (input)="termoBusca = $any($event.target).value"
        (keyup.enter)="pesquisarProdutos()"
    >

    <button class="btn-perfil" type="button" (click)="irParaPerfilOuLogin()">
        {{ usuarioLogado ? 'Meu Perfil' : 'Login' }}
    </button>

    <img class="carrinho" src="assets/images/carrinho.png" alt="carrinho" (click)="menuCarrinho()">
</section>
